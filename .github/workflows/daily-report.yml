name: Korea Market Daily Report

on:
  schedule:
    - cron: '5 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Restore DB
      uses: dawidd6/action-download-artifact@v3
      with:
        name: korea-market-db
        path: data/
        if_no_artifact_found: warn
      continue-on-error: true

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run daily pipeline
      run: python korea_market/run_daily.py
      env:
        DB_PATH: data/korea_market.db
        OUTPUT_DIR: docs/reports

    - name: Update index
      run: python korea_market/update_index.py
      env:
        OUTPUT_DIR: docs/reports

    - name: Save DB
      uses: actions/upload-artifact@v4
      with:
        name: korea-market-db
        path: data/korea_market.db
        retention-days: 90
        overwrite: true

    - name: Commit & Push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/
        git diff --staged --quiet || git commit -m "📊 Daily report $(date +'%Y-%m-%d')"
        git push
